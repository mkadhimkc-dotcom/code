<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>🎀 Sign In — Claire Workout App</title>
    <link href="https://fonts.googleapis.com/css2?family=Nunito:wght@500;700;900&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="css/style.css">
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <style>
        .signin-container {
            max-width: 420px;
            margin: 4rem auto;
            padding: 2rem;
            background: var(--kitty-white);
            border: 4px solid var(--kitty-black);
            border-radius: 25px;
            box-shadow: 6px 6px 0px var(--kitty-pink);
            text-align: center;
        }
        .signin-title {
            font-size: 2rem;
            font-weight: 900;
            color: var(--kitty-pink);
            margin-bottom: 0.5rem;
        }
        .signin-subtitle {
            color: var(--kitty-black);
            font-weight: 700;
            margin-bottom: 2rem;
            font-size: 1rem;
            line-height: 1.5;
        }
        .signin-input {
            width: 100%;
            padding: 12px 16px;
            border: 3px solid var(--kitty-black);
            border-radius: 12px;
            font-family: 'Nunito', sans-serif;
            font-size: 1rem;
            font-weight: 700;
            margin-bottom: 1rem;
            box-sizing: border-box;
            outline: none;
            text-align: center;
        }
        .signin-input:focus {
            border-color: var(--kitty-pink);
            box-shadow: 3px 3px 0px var(--kitty-pink);
        }
        .otp-input {
            font-size: 2rem;
            letter-spacing: 0.5rem;
            font-weight: 900;
        }
        .signin-btn {
            width: 100%;
            padding: 14px;
            background: var(--kitty-pink);
            color: white;
            border: 4px solid var(--kitty-black);
            border-radius: 16px;
            font-family: 'Nunito', sans-serif;
            font-size: 1.1rem;
            font-weight: 900;
            cursor: pointer;
            box-shadow: 4px 4px 0px var(--kitty-black);
            transition: all 0.1s;
            text-transform: uppercase;
            margin-bottom: 1rem;
        }
        .signin-btn:active {
            transform: translate(4px, 4px);
            box-shadow: none;
        }
        .signin-btn:disabled {
            opacity: 0.6;
            cursor: not-allowed;
        }
        .signin-btn-secondary {
            width: 100%;
            padding: 10px;
            background: transparent;
            color: var(--kitty-pink);
            border: 3px solid var(--kitty-pink);
            border-radius: 16px;
            font-family: 'Nunito', sans-serif;
            font-size: 0.95rem;
            font-weight: 900;
            cursor: pointer;
            transition: all 0.1s;
        }
        .signin-btn-secondary:hover {
            background: var(--kitty-pastel);
        }
        .signin-message {
            margin-top: 1rem;
            padding: 1rem;
            border-radius: 12px;
            font-weight: 700;
            display: none;
            line-height: 1.5;
        }
        .signin-message.success {
            background: #e8f5e9;
            color: #2e7d32;
            border: 2px solid #a5d6a7;
            display: block;
        }
        .signin-message.error {
            background: #ffebee;
            color: #c62828;
            border: 2px solid #ef9a9a;
            display: block;
        }
        .step { display: none; }
        .step.active { display: block; }
        .email-display {
            font-weight: 900;
            color: var(--kitty-pink);
            margin-bottom: 1rem;
            font-size: 0.95rem;
        }
        .countdown {
            font-size: 0.85rem;
            color: #999;
            margin-top: 0.5rem;
        }
    </style>
</head>
<body>
<div class="container">
    <div class="signin-container">
        
        <!-- Step 1: Enter Email -->
