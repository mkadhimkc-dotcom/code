<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>🎀 Sign In — Claire Workout App</title>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            font-family: 'Nunito', sans-serif;
            background-color: #fff0f5;
            background-image: radial-gradient(#ff52a3 10%, transparent 10%);
            background-size: 30px 30px;
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 1rem;
        }

        .signin-box {
            background: white;
            border: 4px solid #1a1a1a;
            border-radius: 25px;
            box-shadow: 6px 6px 0px #ff52a3;
            padding: 2rem;
            width: 100%;
            max-width: 400px;
            text-align: center;
        }

        .signin-title {
            font-size: 2rem;
            font-weight: 900;
            color: #ff52a3;
            margin-bottom: 0.5rem;
        }

        .signin-subtitle {
            color: #1a1a1a;
            font-weight: 700;
            margin-bottom: 1.5rem;
            font-size: 0.95rem;
            line-height: 1.5;
        }

        .signin-input {
            width: 100%;
            padding: 12px 16px;
            border: 3px solid #1a1a1a;
            border-radius: 12px;
            font-family: 'Nunito', sans-serif;
            font-size: 1rem;
            font-weight: 700;
            margin-bottom: 1rem;
            outline: none;
            text-align: center;
        }

        .signin-input:focus {
            border-color: #ff52a3;
            box-shadow: 3px 3px 0px #ff52a3;
        }

        .otp-input {
            font-size: 2rem;
            letter-spacing: 0.5rem;
            font-weight: 900;
        }

        .signin-btn {
            width: 100%;
            padding: 14px;
            background: #ff52a3;
            color: white;
            border: 4px solid #1a1a1a;
            border-radius: 16px;
            font-family: 'Nunito', sans-serif;
            font-size: 1.1rem;
            font-weight: 900;
            cursor: pointer;
            box-shadow: 4px 4px 0px #1a1a1a;
            text-transform: uppercase;
            margin-bottom: 1rem;
            transition: all 0.1s;
        }

        .signin-btn:active {
            transform: translate(4px, 4px);
            box-shadow: none;
        }

        .signin-btn:disabled {
            opacity: 0.6;
            cursor: not-allowed;
        }

        .signin-btn-secondary {
            width: 100%;
            padding: 10px;
            background: transparent;
            color: #ff52a3;
            border: 3px solid #ff52a3;
            border-radius: 16px;
            font-family: 'Nunito', sans-serif;
            font-size: 0.95rem;
            font-weight: 900;
            cursor: pointer;
            margin-bottom: 0.5rem;
        }

        .signin-message {
            margin-top: 1rem;
            padding: 1rem;
            border-radius: 12px;
            font-weight: 700;
            display: none;
            line-height: 1.5;
            font-size: 0.9rem;
        }

        .signin-message.success {
            background: #e8f5e9;
            color: #2e7d32;
            border: 2px solid #a5d6a7;
            display: block;
        }

        .signin-message.error {
            background: #ffebee;
            color: #c62828;
            border: 2px solid #ef9a9a;
            display: block;
        }

        .step { display: none; }
        .step.active { display: block; }

        .email-display {
            font-weight: 900;
            color: #ff52a3;
            margin-bottom: 1rem;
            font-size: 0.9rem;
            word-break: break-all;
        }

        .countdown {
            font-size: 0.8rem;
            color: #999;
            margin-top: 0.5rem;
        }
    </style>
 <!-- Cloudflare Web Analytics -->
    <script defer src='https://static.cloudflareinsights.com/beacon.min.js' data-cf-beacon='{"token": "fcf22b5ff2e443269c842dcc3e850a1e"}'></script>
    <!-- End Cloudflare Web Analytics -->
     <script src="https://challenges.cloudflare.com/turnstile/v0/api.js" async defer></script>
</head>
<body>
    <div class="signin-box">

        <!-- Step 1: Enter Email -->
        <div class="step active" id="step-email">
            <div class="signin-title">🎀 Welcome!</div>
            <div class="signin-subtitle">Enter your email and we'll send you a 6-digit code to sign in 💖</div>
            <input type="email" id="email-input" class="signin-input" placeholder="your@email.com" autocomplete="email" />
            <div class="cf-turnstile" data-sitekey="0x4AAAAAADCn04Mxrbi4x6ax" data-theme="light" style="margin-bottom:1rem;display:flex;justify-content:center;"></div>
            <button class="signin-btn" id="send-code-btn">✨ Send Code</button>
            <div class="signin-message" id="email-message"></div>
        </div>

        <!-- Step 2: Enter OTP -->
        <div class="step" id="step-otp">
            <div class="signin-title">💌 Check Email!</div>
            <div class="email-display" id="email-display"></div>
            <div class="signin-subtitle">Enter the 6-digit code we sent you 🌸</div>
            <input type="number" id="otp-input" class="signin-input otp-input" placeholder="000000" autocomplete="one-time-code" />
            <button class="signin-btn" id="verify-btn">🔓 Verify Code</button>
            <button class="signin-btn-secondary" id="resend-btn">📨 Resend Code</button>
            <div class="countdown" id="countdown"></div>
            <div class="signin-message" id="otp-message"></div>
        </div>

        <!-- Step 3: Success -->
        <div class="step" id="step-success">
            <div class="signin-title">🎉 Signed In!</div>
            <div class="signin-subtitle">Welcome back! Taking you to your workouts... 💖</div>
        </div>

    </div>

    <script>
        const SUPABASE_URL = 'https://xragzrjatiudhbrubejf.supabase.co';
        const SUPABASE_ANON_KEY = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6InhyYWd6cmphdGl1ZGhicnViZWpmIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzYzMDY4MTIsImV4cCI6MjA5MTg4MjgxMn0.JyX4aWIK6TTHPeyITWMYGLRRvgANVR2j20wSti5-WUM';

        const { createClient } = supabase;
        const client = createClient(SUPABASE_URL, SUPABASE_ANON_KEY);

        let userEmail = '';
        let countdownInterval = null;

        function showStep(stepId) {
            document.querySelectorAll('.step').forEach(s => s.classList.remove('active'));
            document.getElementById(stepId).classList.add('active');
        }

        function startCountdown(seconds) {
            clearInterval(countdownInterval);
            const el = document.getElementById('countdown');
            let remaining = seconds;
            el.textContent = `Code expires in ${remaining}s`;
            countdownInterval = setInterval(() => {
                remaining--;
                if (remaining <= 0) {
                    clearInterval(countdownInterval);
                    el.textContent = 'Code expired. Please request a new one.';
                    el.style.color = '#c62828';
                } else {
                    el.textContent = `Code expires in ${remaining}s`;
                }
            }, 1000);
        }

        function showMessage(id, text, type) {
            const el = document.getElementById(id);
            el.textContent = text;
            el.className = `signin-message ${type}`;
        }

        // Send code
        document.getElementById('send-code-btn').addEventListener('click', async () => {
            const email = document.getElementById('email-input').value.trim();
            if (!email) { showMessage('email-message', 'Please enter your email 🌸', 'error'); return; }
            const tsResponse = window.turnstile?.getResponse();
            if (!tsResponse) { showMessage('email-message', 'Please complete the security check 🌸', 'error'); return; }

            const btn = document.getElementById('send-code-btn');
            btn.disabled = true;
            btn.textContent = 'Sending... 💌';

            const { error } = await client.auth.signInWithOtp({
            email,
            options: { 
            shouldCreateUser: true,
            emailRedirectTo: null
        }
            });

            if (error) {
                showMessage('email-message', 'Something went wrong. Try again! 🌸', 'error');
                btn.disabled = false;
                btn.textContent = '✨ Send Code';
                window.turnstile?.reset();
            } else {
                userEmail = email;
                document.getElementById('email-display').textContent = `Code sent to: ${email}`;
                showStep('step-otp');
                startCountdown(1800);
            }
        });

        // Verify code
        document.getElementById('verify-btn').addEventListener('click', async () => {
            const token = document.getElementById('otp-input').value.trim();
            if (!token || token.length < 6) { showMessage('otp-message', 'Please enter the 6-digit code 🌸', 'error'); return; }

            const btn = document.getElementById('verify-btn');
            btn.disabled = true;
            btn.textContent = 'Verifying... 🔍';

            const { error } = await client.auth.verifyOtp({
                email: userEmail,
                token,
                type: 'email'
            });

            if (error) {
                showMessage('otp-message', 'Invalid or expired code. Try again! 🌸', 'error');
                btn.disabled = false;
                btn.textContent = '🔓 Verify Code';
            } else {
                clearInterval(countdownInterval);
                showStep('step-success');
                setTimeout(() => { window.location.href = '/'; }, 1500);
            }
        });

        // Resend code
        document.getElementById('resend-btn').addEventListener('click', async () => {
            const btn = document.getElementById('resend-btn');
            btn.disabled = true;
            btn.textContent = 'Sending... 💌';

            const { error } = await client.auth.signInWithOtp({
                email: userEmail,
                options: { shouldCreateUser: true }
            });

            if (error) {
                showMessage('otp-message', 'Could not resend. Try again! 🌸', 'error');
            } else {
                showMessage('otp-message', 'New code sent! Check your email 💌', 'success');
                startCountdown(1800);
            }

            btn.disabled = false;
            btn.textContent = '📨 Resend Code';
        });

        // Enter key support
        document.getElementById('email-input').addEventListener('keypress', (e) => {
            if (e.key === 'Enter') document.getElementById('send-code-btn').click();
        });

        document.getElementById('otp-input').addEventListener('keypress', (e) => {
            if (e.key === 'Enter') document.getElementById('verify-btn').click();
        });

        // Auto verify when 6 digits entered
        document.getElementById('otp-input').addEventListener('input', (e) => {
            const val = e.target.value.replace(/\D/g, '').slice(0, 6);
            e.target.value = val;
            if (val.length === 6) document.getElementById('verify-btn').click();
        });

        // Redirect if already logged in
        client.auth.getSession().then(({ data: { session } }) => {
            if (session) window.location.href = '/';
        });
		// Show deletion confirmation
const params = new URLSearchParams(window.location.search);
if (params.get('deleted') === '1') {
  const sub = document.querySelector('.subtitle');
  if (sub) sub.textContent = 'Your account has been deleted. Sorry to see you go! 💔';
}
    </script>
